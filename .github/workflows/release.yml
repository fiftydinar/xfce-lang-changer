name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libx11-dev libxext-dev libxft-dev libfontconfig-dev

      - name: Build static binary
        run: |
          cargo build --release
          cargo rustc --release -p xfce-lang-changer -- -C target-feature=+crt-static

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp target/release/xfce-lang-changer release/
          cp xfce-lang-changer.desktop release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
