name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary (Alpine musl)
        run: |
          docker run --rm -v $PWD:/build -w /build alpine:latest sh -c "
            apk add --no-cache \
              cmake build-base musl-dev pkgconfig \
              fontconfig-dev freetype-dev \
              libx11-dev libxext-dev libxft-dev \
              libxinerama-dev libxcursor-dev libxfixes-dev libxrender-dev \
              pango-dev cairo-dev \
              curl

            ln -s /usr/bin/gcc /usr/local/bin/musl-gcc
            ln -s /usr/bin/g++ /usr/local/bin/musl-g++

            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . /root/.cargo/env

            echo "=== Default target ==="
            rustup show

            echo \"=== Building for x86_64-unknown-linux-musl ===\"
            cargo build --release --target x86_64-unknown-linux-musl --no-default-features

            echo \"=== Binary type check ===\"
            file /build/target/x86_64-unknown-linux-musl/release/xfce-lang-changer
            readelf -d /build/target/x86_64-unknown-linux-musl/release/xfce-lang-changer | grep -E 'NEEDED|RUNPATH|RPATH'
          "

      - name: Prepare release assets
        run: |
          sudo chown -R $(whoami) target/
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/xfce-lang-changer release/
          cp xfce-lang-changer.desktop release/

      - name: Check binary type
        run: |
          file release/xfce-lang-changer
          readelf -d release/xfce-lang-changer | grep NEEDED

      - name: Upload artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xfce-lang-changer
          path: release/*

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
