name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build fully static binary (Alpine musl)
        run: |
          docker run --rm -v $PWD:/build -w /build rust:alpine sh -c "
            apk add --no-cache \
              cmake build-base musl-dev pkgconfig \
              fontconfig-dev freetype-dev \
              libx11-dev libxext-dev libxft-dev \
              libxinerama-dev libxcursor-dev libxfixes-dev libxrender-dev \
              pango-dev cairo-dev

            ln -s /usr/bin/gcc /usr/local/bin/musl-gcc
            ln -s /usr/bin/g++ /usr/local/bin/musl-g++

            # Download deps first, then patch fltk-sys, then build
            cargo fetch

            FLTKSYS=\$(find /usr/local/cargo/registry/src -name 'link.rs' -path '*/fltk-sys-*')
            echo \"=== Patching \$FLTKSYS ===\"
            # Change GUI libs to static (NOT pthread, which is part of musl libc)
            sed -i 's/cargo:rustc-link-lib=dylib=X/cargo:rustc-link-lib=static=X/g' \"\$FLTKSYS\"
            sed -i 's/cargo:rustc-link-lib=dylib=fontconfig/cargo:rustc-link-lib=static=fontconfig/g' \"\$FLTKSYS\"
            sed -i 's/cargo:rustc-link-lib=dylib=pango/cargo:rustc-link-lib=static=pango/g' \"\$FLTKSYS\"
            sed -i 's/cargo:rustc-link-lib=dylib=gobject/cargo:rustc-link-lib=static=gobject/g' \"\$FLTKSYS\"
            sed -i 's/cargo:rustc-link-lib=dylib=cairo/cargo:rustc-link-lib=static=cairo/g' \"\$FLTKSYS\"
            grep 'link-lib=' \"\$FLTKSYS\"

            cargo build --release --target x86_64-unknown-linux-musl --no-default-features

            echo \"=== Binary check ===\"
            file /build/target/x86_64-unknown-linux-musl/release/xfce-lang-changer
            readelf -d /build/target/x86_64-unknown-linux-musl/release/xfce-lang-changer | grep NEEDED
            echo \"=== ldd check ===\"
            ldd /build/target/x86_64-unknown-linux-musl/release/xfce-lang-changer 2>&1 || true
          "

      - name: Prepare release assets
        run: |
          sudo chown -R $(whoami) target/
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/xfce-lang-changer release/
          cp xfce-lang-changer.desktop release/

      - name: Check binary
        run: |
          file release/xfce-lang-changer
          readelf -d release/xfce-lang-changer | grep NEEDED
          ldd release/xfce-lang-changer 2>&1 || true

      - name: Upload artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xfce-lang-changer
          path: release/*

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
