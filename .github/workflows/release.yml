name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary (Alpine musl)
        run: |
          docker run --rm -v $PWD:/build -w /build alpine:latest sh -c "
            apk add --no-cache \
              cmake build-base musl-dev pkgconfig \
              fontconfig-dev freetype-dev \
              libx11-dev libxext-dev libxft-dev \
              libxinerama-dev libxcursor-dev libxfixes-dev libxrender-dev \
              pango-dev cairo-dev \
              curl

            # On Alpine, gcc/g++ are already musl-based; symlink for fltk-sys
            ln -s /usr/bin/gcc /usr/local/bin/musl-gcc
            ln -s /usr/bin/g++ /usr/local/bin/musl-g++

            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . /root/.cargo/env
            rustup target add x86_64-unknown-linux-musl

            cargo build --release --target x86_64-unknown-linux-musl --no-default-features
          "

      - name: Prepare release assets
        run: |
          sudo chown -R $(whoami) target/
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/xfce-lang-changer release/
          cp xfce-lang-changer.desktop release/

      - name: Verify static binary
        run: ldd release/xfce-lang-changer 2>&1 || true

      - name: Upload artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xfce-lang-changer
          path: release/*

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
