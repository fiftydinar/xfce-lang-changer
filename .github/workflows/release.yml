name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config \
            libx11-dev libxext-dev libxft-dev \
            libxinerama-dev libxcursor-dev libxfixes-dev libxrender-dev \
            libfontconfig-dev libfreetype-dev \
            libpango1.0-dev libcairo2-dev

      - name: Build static binary
        run: |
          # Step 1: Build all deps (proc-macros without +crt-static)
          cargo build --release

          # Step 2: Rebuild final binary with static glibc linking
          RUSTFLAGS="-C target-feature=+crt-static" cargo rustc --release \
            -p xfce-lang-changer

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp target/release/xfce-lang-changer release/
          cp xfce-lang-changer.desktop release/

      - name: Check binary
        run: |
          file release/xfce-lang-changer
          readelf -d release/xfce-lang-changer | grep NEEDED
          ldd release/xfce-lang-changer 2>&1 || true

      - name: Upload artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xfce-lang-changer
          path: release/*

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
